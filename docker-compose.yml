services:
  panel:
    build: .
    container_name: hysteria-panel
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/app/config.yaml
      - DATABASE_DSN=postgres://hysteria:hysteria@db:5432/hysteria?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-random-secret}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - PANEL_DOMAIN=${PANEL_DOMAIN:-example.com}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hysteria-net

  db:
    image: postgres:16-alpine
    container_name: hysteria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hysteria
      POSTGRES_PASSWORD: hysteria
      POSTGRES_DB: hysteria
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hysteria"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hysteria-net

volumes:
  pgdata:

networks:
  hysteria-net:
    driver: bridge
