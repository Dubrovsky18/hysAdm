<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hysteria2 Admin Panel</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --primary: #3b82f6;
  --primary-hover: #2563eb;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.hidden { display: none !important; }
#login-page {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.login-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 40px; width: 100%; max-width: 400px;
}
.login-card h1 { text-align: center; margin-bottom: 8px; font-size: 24px; }
.login-card p { text-align: center; color: var(--text-muted); margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--text-muted); }
.form-group input, .form-group select {
  width: 100%; padding: 10px 12px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 14px; outline: none; transition: border-color .2s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--primary); }
.btn {
  padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px;
  cursor: pointer; transition: all .2s; font-weight: 500;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: .8; }
.btn-success { background: var(--success); color: #fff; }
.btn-warning { background: var(--warning); color: #000; }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-block { width: 100%; }

/* Layout */
#app { display: flex; min-height: 100vh; }
.sidebar {
  width: 240px; background: var(--card); border-right: 1px solid var(--border);
  padding: 20px; display: flex; flex-direction: column;
}
.sidebar h2 { font-size: 16px; margin-bottom: 24px; color: var(--primary); }
.sidebar nav { flex: 1; }
.sidebar nav a {
  display: block; padding: 10px 12px; color: var(--text-muted);
  text-decoration: none; border-radius: 8px; margin-bottom: 4px;
  font-size: 14px; cursor: pointer; transition: all .2s;
}
.sidebar nav a:hover, .sidebar nav a.active { background: var(--bg); color: var(--text); }
.sidebar .user-info { padding-top: 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }
.sidebar .user-info .logout { color: var(--danger); cursor: pointer; margin-top: 8px; display: inline-block; }

.main { flex: 1; padding: 24px; overflow-y: auto; }
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.page-header h1 { font-size: 24px; }

/* Cards */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px;
}
.stat-card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.stat-card .value { font-size: 28px; font-weight: 700; }

/* Tables */
.table-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px 16px; text-align: left; font-size: 14px; border-bottom: 1px solid var(--border); }
th { color: var(--text-muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
tr:last-child td { border-bottom: none; }
.status-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px;
}
.status-active { background: rgba(34,197,94,.15); color: var(--success); }
.status-inactive { background: rgba(239,68,68,.15); color: var(--danger); }
.status-admin { background: rgba(59,130,246,.15); color: var(--primary); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; width: 100%; max-width: 500px;
  max-height: 90vh; overflow-y: auto;
}
.modal h2 { margin-bottom: 20px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

.toast {
  position: fixed; bottom: 20px; right: 20px;
  padding: 12px 20px; border-radius: 8px; font-size: 14px;
  z-index: 2000; animation: slideIn .3s ease;
}
.toast-success { background: var(--success); color: #000; }
.toast-error { background: var(--danger); color: #fff; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.copy-btn { cursor: pointer; color: var(--primary); font-size: 12px; }
.copy-btn:hover { text-decoration: underline; }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
.tab { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-muted); font-size: 14px; }
.tab.active { color: var(--text); border-bottom-color: var(--primary); }

@media (max-width: 768px) {
  .sidebar { width: 60px; padding: 10px; }
  .sidebar h2, .sidebar nav a span, .sidebar .user-info { display: none; }
  .main { padding: 16px; }
}
</style>
</head>
<body>
<div id="login-page">
  <div class="login-card">
    <h1>Hysteria2 Panel</h1>
    <p>Войдите в панель управления</p>
    <form id="login-form">
      <div class="form-group">
        <label>Имя пользователя</label>
        <input type="text" id="login-username" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="login-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Войти</button>
    </form>
  </div>
</div>

<div id="app" class="hidden">
  <aside class="sidebar">
    <h2>Hysteria2</h2>
    <nav>
      <a class="active" data-page="dashboard"><span>📊 Дашборд</span></a>
      <a data-page="users"><span>👥 Пользователи</span></a>
      <a data-page="servers"><span>🖥 Серверы</span></a>
      <a data-page="domains"><span>🌐 Домены</span></a>
    </nav>
    <div class="user-info">
      <div id="sidebar-user">admin</div>
      <a class="logout" id="logout-btn">Выйти</a>
    </div>
  </aside>

  <main class="main" id="main-content"></main>
</div>

<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
const API = '/api';
let token = localStorage.getItem('token');

function getToken() { return token; }

async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(`${API}${path}`, { ...options, headers });
  if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function modal(html) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)this.parentElement.innerHTML=''"><div class="modal">${html}</div></div>`;
  return c.querySelector('.modal');
}

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function formatBytes(bytes) {
  if (!bytes) return '0 B';
  const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + sizes[i];
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => toast('Скопировано!'));
}

// Login
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('login-username').value;
  const password = document.getElementById('login-password').value;
  try {
    const res = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    token = res.token;
    localStorage.setItem('token', token);
    showApp();
    navigate('dashboard');
  } catch (err) {
    toast('Ошибка входа: ' + err.message, 'error');
  }
});

function logout() {
  token = null;
  localStorage.removeItem('token');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-page').classList.remove('hidden');
}

document.getElementById('logout-btn').addEventListener('click', logout);

// Navigation
function showApp() {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}

if (token) { showApp(); navigate('dashboard'); }

document.querySelectorAll('.sidebar nav a').forEach(a => {
  a.addEventListener('click', () => {
    document.querySelectorAll('.sidebar nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    navigate(a.dataset.page);
  });
});

async function navigate(page) {
  const main = document.getElementById('main-content');
  switch (page) {
    case 'dashboard': renderDashboard(main); break;
    case 'users': renderUsers(main); break;
    case 'servers': renderServers(main); break;
    case 'domains': renderDomains(main); break;
  }
}

// Dashboard
async function renderDashboard(main) {
  const stats = await api('/dashboard');
  main.innerHTML = `
    <div class="page-header"><h1>Дашборд</h1></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Пользователи</div><div class="value">${stats.total_users}</div></div>
      <div class="stat-card"><div class="label">Активные</div><div class="value">${stats.active_users}</div></div>
      <div class="stat-card"><div class="label">Серверы</div><div class="value">${stats.total_servers}</div></div>
      <div class="stat-card"><div class="label">Трафик всего</div><div class="value">${formatBytes(stats.total_traffic)}</div></div>
      <div class="stat-card"><div class="label">Трафик сегодня</div><div class="value">${formatBytes(stats.today_traffic)}</div></div>
    </div>
    <div class="page-header"><h2>Трафик пользователей</h2></div>
    <div class="table-container" id="traffic-table"><p style="padding:20px;color:var(--text-muted)">Загрузка...</p></div>
  `;
  const traffic = await api('/users/traffic');
  const tbl = document.getElementById('traffic-table');
  tbl.innerHTML = `<table>
    <thead><tr><th>ID</th><th>Пользователь</th><th>Загружено</th><th>Скачано</th><th>Всего</th><th>Лимит</th></tr></thead>
    <tbody>${traffic.map(t => `<tr>
      <td>${t.user_id}</td>
      <td>${t.username}</td>
      <td>${formatBytes(t.upload)}</td>
      <td>${formatBytes(t.download)}</td>
      <td>${formatBytes(t.total_used)}</td>
      <td>${formatBytes(t.traffic_limit)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// Users
async function renderUsers(main) {
  const users = await api('/users');
  main.innerHTML = `
    <div class="page-header"><h1>Пользователи</h1><button class="btn btn-primary" onclick="showCreateUser()">+ Создать</button></div>
    <div class="table-container"><table>
      <thead><tr><th>ID</th><th>UUID</th><th>Имя</th><th>Email</th><th>Статус</th><th>Трафик</th><th>Подписка</th><th>Действия</th></tr></thead>
      <tbody>${users.map(u => `<tr>
        <td>${u.id}</td>
        <td style="font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis">${u.uuid}</td>
        <td>${u.username}</td>
        <td>${u.email}</td>
        <td><span class="status-badge ${u.status === 'active' ? 'status-active' : 'status-inactive'}">${u.status}</span></td>
        <td>${formatBytes(u.traffic_used)} / ${formatBytes(u.traffic_limit)}</td>
        <td>${u.subscription_url ? `<span class="copy-btn" onclick="copyToClipboard('${u.subscription_url}')">копировать</span>` : '-'}</td>
        <td>
          <button class="btn btn-sm btn-ghost" onclick="showUserKeys(${u.id})">🔑</button>
          <button class="btn btn-sm btn-ghost" onclick="editUser(${u.id})">✏️</button>
          <button class="btn btn-sm btn-ghost" onclick="deleteUser(${u.id})">🗑</button>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>
  `;
}

function showCreateUser() {
  const m = modal(`
    <h2>Создать пользователя</h2>
    <form id="create-user-form">
      <div class="form-group"><label>Имя пользователя</label><input type="text" id="cu-username" required></div>
      <div class="form-group"><label>Пароль</label><input type="password" id="cu-password" required></div>
      <div class="form-group"><label>Email</label><input type="email" id="cu-email"></div>
      <div class="form-group"><label>Лимит трафика (GB)</label><input type="number" id="cu-traffic" value="100"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn btn-primary">Создать</button>
      </div>
    </form>
  `);
  m.querySelector('#create-user-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await api('/users', {
        method: 'POST',
        body: JSON.stringify({
          username: m.querySelector('#cu-username').value,
          password: m.querySelector('#cu-password').value,
          email: m.querySelector('#cu-email').value,
          traffic_limit: parseInt(m.querySelector('#cu-traffic').value) * 1073741824,
        })
      });
      closeModal();
      toast('Пользователь создан');
      navigate('users');
    } catch (err) { toast(err.message, 'error'); }
  });
}

async function editUser(id) {
  const u = await api(`/users/${id}`);
  const m = modal(`
    <h2>Редактировать пользователя</h2>
    <form id="edit-user-form">
      <div class="form-group"><label>Имя пользователя</label><input type="text" id="eu-username" value="${u.username}"></div>
      <div class="form-group"><label>Пароль (оставьте пустым, если не менять)</label><input type="password" id="eu-password"></div>
      <div class="form-group"><label>Email</label><input type="email" id="eu-email" value="${u.email}"></div>
      <div class="form-group"><label>Статус</label>
        <select id="eu-status">
          <option value="active" ${u.status === 'active' ? 'selected' : ''}>Active</option>
          <option value="disabled" ${u.status === 'disabled' ? 'selected' : ''}>Disabled</option>
        </select>
      </div>
      <div class="form-group"><label>Лимит трафика (GB)</label><input type="number" id="eu-traffic" value="${Math.round(u.traffic_limit / 1073741824)}"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </div>
    </form>
  `);
  m.querySelector('#edit-user-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      const body = {
        username: m.querySelector('#eu-username').value,
        email: m.querySelector('#eu-email').value,
        status: m.querySelector('#eu-status').value,
        traffic_limit: parseInt(m.querySelector('#eu-traffic').value) * 1073741824,
      };
      const pwd = m.querySelector('#eu-password').value;
      if (pwd) body.password = pwd;
      await api(`/users/${id}`, { method: 'PUT', body: JSON.stringify(body) });
      closeModal();
      toast('Пользователь обновлён');
      navigate('users');
    } catch (err) { toast(err.message, 'error'); }
  });
}

async function deleteUser(id) {
  if (!confirm('Удалить пользователя?')) return;
  try {
    await api(`/users/${id}`, { method: 'DELETE' });
    toast('Пользователь удалён');
    navigate('users');
  } catch (err) { toast(err.message, 'error'); }
}

async function showUserKeys(userId) {
  const keys = await api(`/users/${userId}/keys`);
  const servers = await api('/servers');
  const user = await api(`/users/${userId}`);
  const m = modal(`
    <h2>🔑 Ключи: ${user.username}</h2>
    <div style="margin-bottom:16px">
      <button class="btn btn-sm btn-success" onclick="generateSub(${userId})">📋 Сгенерировать подписку</button>
      <button class="btn btn-sm btn-primary" onclick="showAddKey(${userId})">+ Ключ</button>
    </div>
    <div class="table-container"><table>
      <thead><tr><th>Сервер ID</th><th>Ключ</th><th>Трафик</th><th>Статус</th><th>Действия</th></tr></thead>
      <tbody>${keys.length ? keys.map(k => `<tr>
        <td>${k.server_id}</td>
        <td style="font-size:11px">${k.key}</td>
        <td>${formatBytes(k.traffic_used)} / ${formatBytes(k.traffic_limit)}</td>
        <td><span class="status-badge ${k.is_active ? 'status-active' : 'status-inactive'}">${k.is_active ? 'active' : 'revoked'}</span></td>
        <td>${k.is_active ? `<button class="btn btn-sm btn-danger" onclick="revokeKey(${k.id})">Отозвать</button>` : '-'}</td>
      </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Нет ключей</td></tr>'}</tbody>
    </table></div>
  `);
}

async function showAddKey(userId) {
  const servers = await api('/servers');
  const m = modal(`
    <h2>Добавить ключ</h2>
    <form id="add-key-form">
      <div class="form-group"><label>Сервер</label>
        <select id="ak-server">
          ${servers.filter(s => s.is_active).map(s => `<option value="${s.id}">${s.name} (${s.address})</option>`).join('')}
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn btn-primary">Создать</button>
      </div>
    </form>
  `);
  m.querySelector('#add-key-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await api(`/users/${userId}/keys`, {
        method: 'POST',
        body: JSON.stringify({ server_id: parseInt(m.querySelector('#ak-server').value) })
      });
      closeModal();
      toast('Ключ создан');
      showUserKeys(userId);
    } catch (err) { toast(err.message, 'error'); }
  });
}

async function revokeKey(keyId) {
  if (!confirm('Отозвать ключ?')) return;
  try {
    await api(`/keys/${keyId}`, { method: 'DELETE' });
    toast('Ключ отозван');
    navigate('users');
  } catch (err) { toast(err.message, 'error'); }
}

async function generateSub(userId) {
  try {
    const sub = await api(`/users/${userId}/subscription`, { method: 'POST' });
    toast('Подписка сгенерирована');
    copyToClipboard(sub.link);
    navigate('users');
  } catch (err) { toast(err.message, 'error'); }
}

// Servers
async function renderServers(main) {
  const servers = await api('/servers');
  main.innerHTML = `
    <div class="page-header"><h1>Серверы</h1><button class="btn btn-primary" onclick="showCreateServer()">+ Добавить</button></div>
    <div class="table-container"><table>
      <thead><tr><th>ID</th><th>Название</th><th>Адрес</th><th>Порт</th><th>Локация</th><th>Статус</th><th>Действия</th></tr></thead>
      <tbody>${servers.map(s => `<tr>
        <td>${s.id}</td>
        <td>${s.name}</td>
        <td>${s.address}</td>
        <td>${s.port}</td>
        <td>${s.location || '-'}</td>
        <td><span class="status-badge ${s.is_active ? 'status-active' : 'status-inactive'}">${s.is_active ? 'active' : 'inactive'}</span></td>
        <td>
          <button class="btn btn-sm btn-ghost" onclick="toggleServer(${s.id}, ${!s.is_active})">${s.is_active ? '🔴' : '🟢'}</button>
          <button class="btn btn-sm btn-ghost" onclick="editServer(${s.id})">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="deleteServer(${s.id})">🗑</button>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>
  `;
}

function showCreateServer() {
  const m = modal(`
    <h2>Добавить сервер</h2>
    <form id="create-server-form">
      <div class="form-group"><label>Название</label><input type="text" id="cs-name" required></div>
      <div class="form-group"><label>Адрес</label><input type="text" id="cs-address" required></div>
      <div class="form-group"><label>Порт</label><input type="number" id="cs-port" value="443"></div>
      <div class="form-group"><label>API Порт</label><input type="number" id="cs-apiport" value="9443"></div>
      <div class="form-group"><label>API Ключ</label><input type="text" id="cs-apikey"></div>
      <div class="form-group"><label>Локация</label><input type="text" id="cs-location"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn btn-primary">Создать</button>
      </div>
    </form>
  `);
  m.querySelector('#create-server-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await api('/servers', {
        method: 'POST',
        body: JSON.stringify({
          name: m.querySelector('#cs-name').value,
          address: m.querySelector('#cs-address').value,
          port: parseInt(m.querySelector('#cs-port').value),
          api_port: parseInt(m.querySelector('#cs-apiport').value),
          api_key: m.querySelector('#cs-apikey').value,
          location: m.querySelector('#cs-location').value,
        })
      });
      closeModal();
      toast('Сервер добавлен');
      navigate('servers');
    } catch (err) { toast(err.message, 'error'); }
  });
}

async function toggleServer(id, active) {
  try {
    await api(`/servers/${id}/toggle`, { method: 'PUT', body: JSON.stringify({ active }) });
    navigate('servers');
  } catch (err) { toast(err.message, 'error'); }
}

async function deleteServer(id) {
  if (!confirm('Удалить сервер?')) return;
  try {
    await api(`/servers/${id}`, { method: 'DELETE' });
    toast('Сервер удалён');
    navigate('servers');
  } catch (err) { toast(err.message, 'error'); }
}

// Domains
async function renderDomains(main) {
  const domains = await api('/domains');
  const servers = await api('/servers');
  main.innerHTML = `
    <div class="page-header"><h1>Домены</h1><button class="btn btn-primary" onclick="showCreateDomain()">+ Добавить</button></div>
    <div class="table-container"><table>
      <thead><tr><th>ID</th><th>Домен</th><th>Сервер</th><th>Статус</th><th>Действия</th></tr></thead>
      <tbody>${domains.map(d => {
        const server = servers.find(s => s.id === d.server_id);
        return `<tr>
          <td>${d.id}</td>
          <td>${d.domain}</td>
          <td>${server ? server.name : '-'}</td>
          <td><span class="status-badge ${d.is_active ? 'status-active' : 'status-inactive'}">${d.is_active ? 'active' : 'inactive'}</span></td>
          <td><button class="btn btn-sm btn-danger" onclick="deleteDomain(${d.id})">🗑</button></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  `;
}

function showCreateDomain() {
  api('/servers').then(servers => {
    const m = modal(`
      <h2>Добавить домен</h2>
      <form id="create-domain-form">
        <div class="form-group"><label>Домен</label><input type="text" id="cd-domain" required placeholder="example.com"></div>
        <div class="form-group"><label>Сервер</label>
          <select id="cd-server">
            ${servers.filter(s => s.is_active).map(s => `<option value="${s.id}">${s.name} (${s.address})</option>`).join('')}
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Отмена</button>
          <button type="submit" class="btn btn-primary">Создать</button>
        </div>
      </form>
    `);
    m.querySelector('#create-domain-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await api('/domains', {
          method: 'POST',
          body: JSON.stringify({
            domain: m.querySelector('#cd-domain').value,
            server_id: parseInt(m.querySelector('#cd-server').value),
          })
        });
        closeModal();
        toast('Домен добавлен');
        navigate('domains');
      } catch (err) { toast(err.message, 'error'); }
    });
  });
}

async function deleteDomain(id) {
  if (!confirm('Удалить домен?')) return;
  try {
    await api(`/domains/${id}`, { method: 'DELETE' });
    toast('Домен удалён');
    navigate('domains');
  } catch (err) { toast(err.message, 'error'); }
}
</script>
</body>
